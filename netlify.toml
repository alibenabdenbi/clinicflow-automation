[build]
  publish = "public/netlify-deploy"
  functions = "public/netlify-deploy/netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["nodemailer"]

[[redirects]]
  from = "/api/portal"
  to = "/.netlify/functions/portal"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://clinicflowautomation.com/api/:splat"
  status = 200
  force = true
