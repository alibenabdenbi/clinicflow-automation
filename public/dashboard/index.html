<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ORE — Outreach Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0b0f14;
      --card:#0f1620;
      --line:rgba(255,255,255,.08);
      --muted:rgba(255,255,255,.65);
      --text:rgba(255,255,255,.92);
      --good:#22c55e;
      --warn:#f59e0b;
      --bad:#ef4444;
      --pill:rgba(255,255,255,.08);
      --shadow: 0 18px 50px rgba(0,0,0,.55);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,Segoe UI,Roboto,Arial;
      background: radial-gradient(1200px 700px at 20% 10%, rgba(255,255,255,.06), transparent 55%),
                  radial-gradient(900px 600px at 80% 20%, rgba(255,255,255,.05), transparent 55%),
                  var(--bg);
      color:var(--text);
    }
    .wrap{max-width:1100px;margin:0 auto;padding:28px 18px 60px}
    .top{
      display:flex;align-items:flex-end;justify-content:space-between;gap:14px;
      margin-bottom:18px;
    }
    h1{margin:0;font-size:22px;letter-spacing:.2px}
    .sub{color:var(--muted);font-size:13px;margin-top:6px;line-height:1.4}
    .btn{
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      color:var(--text);
      padding:10px 12px;
      border-radius:12px;
      cursor:pointer;
      transition:.15s;
    }
    .btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.08)}
    .grid{display:grid;grid-template-columns:1fr;gap:12px}
    .stats{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:10px;
      margin:14px 0 16px;
    }
    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
    }
    .k{color:var(--muted);font-size:12px}
    .v{font-size:18px;margin-top:6px}
    .tasksHeader{
      display:flex;align-items:center;justify-content:space-between;
      margin:18px 0 10px;
    }
    .pill{
      display:inline-flex;align-items:center;gap:8px;
      padding:7px 10px;border-radius:999px;
      background:var(--pill);
      border:1px solid var(--line);
      color:var(--muted);
      font-size:12px;
    }
    .task{
      display:grid;grid-template-columns: 1fr;gap:10px;
      padding:16px;
    }
    .taskTop{
      display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;
      align-items:flex-start;
    }
    .title{font-weight:600}
    a{color:#c7d2fe;text-decoration:none}
    a:hover{text-decoration:underline}
    .meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .tag{font-size:12px;color:var(--muted);border:1px solid var(--line);background:rgba(0,0,0,.15);padding:6px 8px;border-radius:999px}
    .msg{
      border:1px solid var(--line);
      background:rgba(0,0,0,.18);
      border-radius:14px;
      padding:12px;
      color:rgba(255,255,255,.85);
      white-space:pre-wrap;
      line-height:1.45;
      font-size:13px;
    }
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn.primary{background:rgba(34,197,94,.14);border-color:rgba(34,197,94,.35)}
    .btn.primary:hover{background:rgba(34,197,94,.18)}
    .btn.danger{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.35)}
    .btn.danger:hover{background:rgba(239,68,68,.16)}
    .small{font-size:12px;color:var(--muted)}
    @media (max-width:900px){.stats{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>ORE — Outreach Console</h1>
        <div class="sub">Approve messages fast. Copy → open link → send manually. CRM updates automatically.</div>
      </div>
      <button class="btn" id="refreshBtn">Refresh</button>
    </div>

    <div class="stats">
      <div class="card">
        <div class="k">Leads total</div>
        <div class="v" id="leadsTotal">—</div>
      </div>
      <div class="card">
        <div class="k">Tasks today</div>
        <div class="v" id="tasksToday">—</div>
      </div>
      <div class="card">
        <div class="k">Tier A</div>
        <div class="v" id="tierA">—</div>
      </div>
      <div class="card">
        <div class="k">Tier B</div>
        <div class="v" id="tierB">—</div>
      </div>
    </div>

    <div class="tasksHeader">
      <div class="pill" id="generatedAt">Generated: —</div>
      <div class="pill" id="statusPill">Status: OK</div>
    </div>

    <div class="grid" id="tasks"></div>

    <div style="margin-top:18px" class="small">
      Tip: “Approve” copies the text + opens the post/profile. You paste on Reddit/LinkedIn manually (safer + avoids bans).
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
