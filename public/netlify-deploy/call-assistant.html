<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>ClinicFlow &mdash; Call Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F8F7F4;--surface:#FFFFFF;--surface2:#F2F1EE;
  --border:#E4E2DC;--text:#1A1916;--text2:#6B6860;--text3:#A8A69F;
  --navy:#1B2B4B;--navy2:#2D4170;
  --green:#1A7A4A;--green-bg:#EBF5EF;
  --red:#C0392B;--red-bg:#FDECEA;
  --amber:#B45309;--amber-bg:#FEF3C7;
  --r:8px;--sh:0 1px 3px rgba(0,0,0,.08);--sh-md:0 4px 12px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}

.pin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.pin-logo{font-family:'DM Serif Display',serif;font-size:30px;color:var(--navy);margin-bottom:4px}
.pin-sub{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:40px}
.pin-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px 24px;width:100%;max-width:300px;box-shadow:var(--sh-md);text-align:center}
.pin-label{font-size:13px;color:var(--text2);font-weight:500;margin-bottom:14px}
.pin-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r);padding:14px;font-size:24px;text-align:center;color:var(--navy);font-family:'DM Sans',sans-serif;font-weight:600;letter-spacing:10px;outline:none;margin-bottom:14px;transition:border-color .2s}
.pin-input:focus{border-color:var(--navy)}
.pin-btn{width:100%;background:var(--navy);color:#fff;border:none;border-radius:var(--r);padding:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s}
.pin-btn:active{background:var(--navy2)}

.app{display:none;max-width:480px;margin:0 auto}
.app-header{background:var(--navy);padding:20px 16px 16px;position:sticky;top:0;z-index:10}
.app-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.app-logo{font-family:'DM Serif Display',serif;font-size:20px;color:#fff}
.live-pill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);padding:4px 10px;border-radius:20px}
.live-dot{width:6px;height:6px;border-radius:50%;background:#4ADE80;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.live-txt{font-size:11px;color:rgba(255,255,255,.8);font-weight:500}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat{background:rgba(255,255,255,.08);border-radius:6px;padding:10px;text-align:center}
.stat-n{font-size:22px;font-weight:600;color:#fff;line-height:1}
.stat-n.g{color:#4ADE80}.stat-n.a{color:#FCD34D}
.stat-l{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px;margin-top:3px}

.list{padding:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;box-shadow:var(--sh);transition:border-color .15s}
.card.open{border-color:var(--navy)}
.card.yes{border-color:var(--green);background:var(--green-bg)}
.card.no{opacity:.45}
.card-top{display:flex;align-items:center;padding:14px 16px;cursor:pointer;gap:10px;user-select:none}
.card-num{font-size:11px;font-weight:600;color:var(--text3);width:18px;flex-shrink:0}
.card-body{flex:1;min-width:0}
.card-owner{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-clinic{font-size:12px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sub{font-size:11px;color:var(--text3);margin-top:2px}
.signal{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.signal.pain{background:var(--red)}
.signal.bounce{background:var(--amber)}
.chevron{font-size:11px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.card.open .chevron{transform:rotate(180deg)}

.detail{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.section{margin-top:14px}
.sec-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:7px}
.script{background:var(--navy);color:rgba(255,255,255,.92);border-radius:var(--r);padding:14px;font-size:13px;line-height:1.75;font-style:italic}
.pain-box{background:var(--red-bg);border-left:3px solid var(--red);border-radius:0 var(--r) var(--r) 0;padding:12px;font-size:13px;color:var(--red);line-height:1.6}
.gate-box{background:var(--amber-bg);border-left:3px solid var(--amber);border-radius:0 var(--r) var(--r) 0;padding:12px;font-size:13px;color:var(--amber);line-height:1.6}
.vm-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:12px;font-size:12px;color:var(--text2);line-height:1.65}
.obj{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:6px}
.obj-q{font-size:12px;font-weight:600;color:var(--amber);margin-bottom:4px}
.obj-a{font-size:12px;color:var(--text2);line-height:1.5}

.btns-main{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.btn-call{background:var(--navy);color:#fff;border:none;border-radius:var(--r);padding:14px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .15s}
.btn-call:active{background:var(--navy2)}
.btn-demo{background:var(--surface);color:var(--navy);border:1.5px solid var(--navy);border-radius:var(--r);padding:14px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.btn-demo:active{background:var(--navy);color:#fff}
.btns-out{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.btn-out{border:1.5px solid;border-radius:var(--r);padding:10px 4px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.btn-out.yes{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.btn-out.later{background:var(--amber-bg);color:var(--amber);border-color:var(--amber)}
.btn-out.no{background:var(--surface2);color:var(--text3);border-color:var(--border)}
.pg-link{margin-top:10px;font-size:11px;color:var(--text3);padding-top:10px;border-top:1px solid var(--border)}
.pg-link strong{color:var(--navy)}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;display:none;z-index:100;white-space:nowrap;box-shadow:var(--sh-md)}
.toast.ok{background:var(--green)}
</style>
</head>

function tog(i){
  var d=document.getElementById('d'+i);
  var c=document.getElementById('c'+i);
  var open=d.style.display==='block';
  document.querySelectorAll('.detail').forEach(function(x){x.style.display='none';});
  document.querySelectorAll('.card').forEach(function(x){x.classList.remove('open');});
  if(!open){
    d.style.display='block';
    c.classList.add('open');
    setTimeout(function(){c.scrollIntoView({behavior:'smooth',block:'nearest'});},50);
  }
}

async function demo(e,i){
  e.stopPropagation();
  var btn=e.target;
  var c=data[i];
  btn.textContent='Sending...';btn.disabled=true;
  try{
    await fetch('/api/trigger-demo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:c.phone,clinic:c.clinicName})});
    btn.textContent='Sent!';
    toast('Demo sent — they can try it now',true);
    setTimeout(function(){btn.textContent='Send Demo SMS';btn.disabled=false;},3000);
  }catch(err){btn.textContent='Failed';btn.disabled=false;}
}

function out(e,i,result){
  e.stopPropagation();
  var card=document.getElementById('c'+i);
  done++;document.getElementById('sDone').textContent=done;
  if(result==='yes'){
    yes++;document.getElementById('sYes').textContent=yes;
    card.classList.add('yes');
    toast('🎉 INTERESTED! Text Ali: 438-544-0442',true);
  } else if(result==='no'){
    card.classList.add('no');
  } else {
    toast('Callback logged for '+data[i].clinicName,false);
  }
  document.getElementById('d'+i).style.display='none';
  card.classList.remove('open');
  fetch('/api/track',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({page:'/call-assistant/outcome',clinic:data[i].clinicName,outcome:result,ts:Date.now()}),
    keepalive:true}).catch(function(){});
}

function toast(msg,ok){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(ok?' ok':'');
  t.style.display='block';
  setTimeout(function(){t.style.display='none';},4000);
}
