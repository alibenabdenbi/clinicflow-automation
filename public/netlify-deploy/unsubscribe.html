<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Unsubscribed | ClinicFlow</title>
  <meta name="robots" content="noindex, nofollow"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue:#1a6bbd; --blue-dark:#114f93; --accent:#0fa86e; --text:#1a2332; --muted:#5a6a80; --border:#d0dcea; --bg:#f7fafd; }
    body { font-family: ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); display:flex; min-height:100vh; align-items:center; justify-content:center; padding:20px; }
    .card { background:#fff; border:1px solid var(--border); border-radius:14px; padding:52px 44px; max-width:460px; width:100%; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,.06); }
    .icon { width:56px; height:56px; background:#ecfdf5; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 24px; font-size:26px; }
    h1 { font-size:24px; font-weight:900; margin-bottom:12px; letter-spacing:-.3px; }
    p { color:var(--muted); line-height:1.6; margin-bottom:16px; }
    a.home { display:inline-block; margin-top:8px; color:var(--blue); text-decoration:none; font-weight:600; font-size:15px; }
    a.home:hover { text-decoration:underline; }
    .divider { border:none; border-top:1px solid var(--border); margin:24px 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>You've been removed.</h1>
    <p>You won't hear from us again. Your email address has been permanently removed from our list.</p>
    <p style="font-size:14px;">If this was a mistake, email us at<br/><a href="mailto:contact@clinicflowautomation.com" style="color:var(--blue);">contact@clinicflowautomation.com</a> and we'll sort it out.</p>
    <hr class="divider"/>
    <a class="home" href="/">← Back to ClinicFlow</a>
  </div>
</body>
</html>
